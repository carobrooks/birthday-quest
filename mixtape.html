<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neil's Birthday Mixtape</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --accent: #ff6b35;
    --accent2: #ff3864;
    --text: #f5f3ed;
    --muted: #9a9ab8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }

  /* ===== TITLE ===== */
  #title {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.8s ease;
    padding: 24px;
  }

  #title.hidden { opacity: 0; pointer-events: none; }

  .t-msg {
    font-size: 17px;
    color: var(--text);
    text-align: center;
    line-height: 2.2;
    font-weight: 300;
    margin-bottom: 40px;
    max-width: 300px;
  }

  .btn-note {
    font-size: 48px;
    color: var(--text);
    background: none;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    animation: notePulse 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.4));
  }

  @keyframes notePulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* ===== MAIN ===== */
  #main {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #main.active { display: flex; }

  .track-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    letter-spacing: 3px;
    text-transform: uppercase;
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  /* ===== VINYL ===== */
  .vinyl-wrap {
    width: 92vw;
    height: 92vw;
    max-width: 420px;
    max-height: 420px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .vinyl-wrap.rising {
    animation: riseIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes riseIn {
    0% { transform: translateY(120vh) rotate(15deg); opacity: 0; }
    60% { transform: translateY(-8px) rotate(-2deg); opacity: 1; }
    80% { transform: translateY(4px) rotate(1deg); }
    100% { transform: translateY(0) rotate(0deg); opacity: 1; }
  }

  .vinyl-wrap.exiting {
    animation: exitUp 0.6s ease-in forwards;
  }

  @keyframes exitUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
  }

  .vinyl-wrap.dropping {
    animation: exitDown 0.6s ease-in forwards;
  }

  @keyframes exitDown {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(120vh); opacity: 0; }
  }

  .vinyl-wrap.descending {
    animation: descendIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes descendIn {
    0% { transform: translateY(-120vh) rotate(-15deg); opacity: 0; }
    60% { transform: translateY(8px) rotate(2deg); opacity: 1; }
    80% { transform: translateY(-4px) rotate(-1deg); }
    100% { transform: translateY(0) rotate(0deg); opacity: 1; }
  }

  .vinyl-canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 8px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .vinyl-inner {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .vinyl-inner.spinning { animation: spin 2.5s linear infinite; }
  .vinyl-inner.paused { animation-play-state: paused; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .vinyl-emoji {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(44px, 14vw, 64px);
    z-index: 2;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .vinyl-center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--bg);
    z-index: 3;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
  }

  /* Pause indicator */
  .pause-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    font-size: 32px;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

  .pause-icon.visible { opacity: 0.8; }

  .swipe-hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.5s ease;
    position: absolute;
    bottom: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .swipe-hint.visible {
    opacity: 1;
    animation: pulse 2s ease-in-out infinite;
  }

  .swipe-arrow {
    font-size: 16px;
    animation: swipeUp 1.5s ease-in-out infinite;
  }

  @keyframes swipeUp {
    0%, 100% { transform: translateY(4px); opacity: 0.4; }
    50% { transform: translateY(-4px); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }

  /* ===== SPOTIFY OVERLAY ===== */
  .spotify-overlay {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    max-width: 340px;
    border-radius: 12px;
    overflow: hidden;
    z-index: 4;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .spotify-overlay.visible { opacity: 1; }

  /* ===== VICTORY ===== */
  #victory {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    padding: 24px;
    text-align: center;
  }

  #victory.active { display: flex; }

  .v-title {
    font-weight: 700;
    font-size: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }

  .v-msg {
    font-size: 16px;
    color: var(--text);
    line-height: 2.2;
    max-width: 300px;
    font-weight: 300;
  }

  .v-msg em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  .confetti {
    position: fixed;
    z-index: 201;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(1080deg); opacity: 0; }
  }

  .reset {
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 999;
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    color: var(--muted);
    background: none;
    border: 1px solid #1a1a2a;
    padding: 4px 8px;
    border-radius: 12px;
    cursor: pointer;
    opacity: 0.25;
  }

  .reset:hover { opacity: 0.7; }

  audio { display: none; }
</style>
</head>
<body>

<div id="title">
  <div class="t-msg">
    Fun fact: it's still your birthday.<br><br>
    And we have lots to do!<br><br>
    When you're ready, tap the note<br>
    and let the music guide you.
  </div>
  <button class="btn-note" id="startBtn">♩</button>
</div>

<div id="main">
  <div class="track-label" id="trackLabel">Track 1</div>
  <div class="vinyl-wrap" id="vinylWrap">
    <div class="vinyl-inner" id="vinylInner">
      <canvas class="vinyl-canvas" id="vinylCanvas"></canvas>
      <div class="vinyl-emoji" id="vinylEmoji">☕</div>
      <div class="vinyl-center-dot"></div>
    </div>
    <div class="pause-icon" id="pauseIcon">⏸</div>
  </div>
  <div class="swipe-hint" id="swipeHint">
    <span class="swipe-arrow">↑</span>
    <span>swipe up</span>
  </div>
  <div class="spotify-overlay" id="spotifyOverlay"></div>
  <audio id="audio" preload="auto"></audio>
</div>

<div id="victory">
  <div class="v-title">Happy birthday, my sweet.</div>
  <div class="v-msg">
    You are loved more than<br>
    all the notes in all the<br>
    songs ever written.<br><br>
    Thank you for being<br>
    my favorite sound.
  </div>
</div>

<button class="reset" id="resetBtn" style="display:none">↺</button>

<script>
  // ===== RESET =====
  if (location.search.includes('reset') || location.hash.includes('reset')) {
    localStorage.removeItem('mix5');
    location.hash = '';
    try { history.replaceState({}, '', location.pathname); } catch(e) {}
  }

  // ===== TRACK DATA =====
  const TRACKS = [
    { num: 'Track 1', emoji: '◉', type: 'black',
      grooveColor1: '#2a1a0a', grooveColor2: '#3d2810',
      labelGrad: ['#8B6914','#D4A843'],
      src: 'track1.mp3', hint: 'swipe up after coffee' },
    { num: 'Track 2', emoji: '◈', type: 'black',
      grooveColor1: '#2a1020', grooveColor2: '#3d1830',
      labelGrad: ['#E8725A','#F5B041'],
      src: 'track2.mp3', hint: 'swipe up after the tour' },
    { num: 'Track 3', emoji: '⁂', type: 'black',
      grooveColor1: '#0a0a2a', grooveColor2: '#15103d',
      labelGrad: ['#2C3E50','#4A148C'],
      src: 'track3.mp3', hint: 'swipe up after our visit' },
    { num: 'Track 4', emoji: '✦', type: 'black',
      grooveColor1: '#1a0f05', grooveColor2: '#2d1a0a',
      labelGrad: ['#8B4513','#CD853F'],
      src: 'track4.mp3', hint: 'swipe up after our meal' },
    { num: 'Track 5', emoji: '♪', type: 'black',
      grooveColor1: '#1a0520', grooveColor2: '#2d0a35',
      labelGrad: ['#E91E63','#9C27B0'],
      src: 'track5.mp3', hint: 'swipe up after the show' },
    { num: 'Track 6', emoji: '☽', type: 'gold',
      grooveColor1: '#2a2008', grooveColor2: '#3d3010',
      labelGrad: ['#1a237e','#4a148c'],
      src: 'track6.mp3', hint: 'swipe up tomorrow' },
    { num: 'Track 7', emoji: '♫', type: 'platinum',
      grooveColor1: '#1a1a20', grooveColor2: '#2a2a35',
      labelGrad: ['#888','#ccc'],
      src: 'nothing-rhymes-with-avi.mp3', hint: 'swipe up when you\'re ready' },
    { num: 'Track 8', emoji: '∞', type: 'holographic',
      grooveColor1: '#1a1020', grooveColor2: '#201530',
      labelGrad: ['#FFD700','#FF6B35','#FF3864','#7B68EE'],
      src: '',
      spotify: true, hint: '' }
  ];

  // ===== VINYL DRAWING =====
  function drawVinyl(canvas, track) {
    const size = canvas.parentElement.offsetWidth;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const cx = size / 2, cy = size / 2, outerR = size / 2;
    const labelR = size * 0.19;

    let baseFill;
    if (track.type === 'gold') {
      baseFill = ctx.createRadialGradient(cx, cy, labelR, cx, cy, outerR);
      baseFill.addColorStop(0, '#4a3a10');
      baseFill.addColorStop(0.5, '#2a1f08');
      baseFill.addColorStop(1, '#1a1408');
    } else if (track.type === 'platinum') {
      baseFill = ctx.createRadialGradient(cx, cy, labelR, cx, cy, outerR);
      baseFill.addColorStop(0, '#3a3a42');
      baseFill.addColorStop(0.5, '#22222a');
      baseFill.addColorStop(1, '#18181e');
    } else if (track.type === 'holographic') {
      baseFill = ctx.createRadialGradient(cx, cy, labelR, cx, cy, outerR);
      baseFill.addColorStop(0, '#1a1030');
      baseFill.addColorStop(0.3, '#0a1a2a');
      baseFill.addColorStop(0.6, '#1a0a20');
      baseFill.addColorStop(1, '#0a0a18');
    } else {
      baseFill = '#111';
    }

    ctx.beginPath();
    ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
    ctx.fillStyle = baseFill;
    ctx.fill();

    const grooveStart = labelR + 4;
    const grooveEnd = outerR - 4;
    const grooveCount = Math.floor((grooveEnd - grooveStart) / 3);

    for (let i = 0; i < grooveCount; i++) {
      const r = grooveStart + i * 3;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (track.type === 'gold') {
        ctx.strokeStyle = `rgba(212, 175, 55, ${Math.sin(i * 0.3) * 0.15 + 0.15})`;
      } else if (track.type === 'platinum') {
        ctx.strokeStyle = `rgba(200, 200, 220, ${Math.sin(i * 0.25) * 0.12 + 0.12})`;
      } else if (track.type === 'holographic') {
        ctx.strokeStyle = `hsla(${(i * 8) % 360}, 70%, 50%, ${Math.sin(i * 0.2) * 0.15 + 0.12})`;
      } else {
        ctx.strokeStyle = i % 2 === 0 ? track.grooveColor1 : track.grooveColor2;
      }
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(cx, cy, outerR - 1, 0, Math.PI * 2);
    if (track.type === 'gold') ctx.strokeStyle = 'rgba(212, 175, 55, 0.3)';
    else if (track.type === 'platinum') ctx.strokeStyle = 'rgba(200, 200, 220, 0.25)';
    else if (track.type === 'holographic') ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    else ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const labelGrad = ctx.createLinearGradient(cx - labelR, cy - labelR, cx + labelR, cy + labelR);
    track.labelGrad.forEach((c, i) => labelGrad.addColorStop(i / (track.labelGrad.length - 1), c));
    ctx.beginPath();
    ctx.arc(cx, cy, labelR, 0, Math.PI * 2);
    ctx.fillStyle = labelGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ===== STATE =====
  let state = load();
  function defaults() { return { current: 0, playing: false }; }
  function load() {
    try {
      const s = JSON.parse(localStorage.getItem('mix5'));
      return s && typeof s.current === 'number' ? s : defaults();
    } catch(e) { return defaults(); }
  }
  function save() { localStorage.setItem('mix5', JSON.stringify(state)); }

  // ===== ELEMENTS =====
  const $ = id => document.getElementById(id);
  const vinylWrap = $('vinylWrap');
  const vinylInner = $('vinylInner');
  const vinylCanvas = $('vinylCanvas');
  const vinylEmoji = $('vinylEmoji');
  const audioEl = $('audio');
  const spotifyOverlay = $('spotifyOverlay');
  const pauseIcon = $('pauseIcon');
  const swipeHint = $('swipeHint');

  let isPlaying = false;
  let isTransitioning = false;
  let goingBack = false;

  // ===== AUDIO =====
  // Pre-unlock audio on first user tap (mobile Safari requirement)
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    audioEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
    audioEl.play().then(() => { audioEl.pause(); audioUnlocked = true; }).catch(() => {});
  }

  function startAudio(src) {
    if (!src) return;
    audioEl.src = src;
    audioEl.play().catch(() => {
      // If autoplay fails, show tap hint so user taps to play
      vinylInner.classList.add('spinning', 'paused');
      pauseIcon.textContent = '▶';
      pauseIcon.classList.add('visible');
      isPlaying = false;
      return;
    });
    isPlaying = true;
    vinylInner.classList.add('spinning');
    vinylInner.classList.remove('paused');
    pauseIcon.classList.remove('visible');
    pauseIcon.textContent = '⏸';
  }

  function togglePlayPause() {
    if (isTransitioning) return;
    const t = TRACKS[state.current];
    if (t.spotify) return; // can't pause spotify

    if (isPlaying) {
      audioEl.pause();
      isPlaying = false;
      vinylInner.classList.add('paused');
      pauseIcon.textContent = '▶';
      pauseIcon.classList.add('visible');
    } else {
      audioEl.play().catch(() => {});
      isPlaying = true;
      vinylInner.classList.remove('paused');
      pauseIcon.textContent = '⏸';
      // Brief flash of pause icon then hide
      pauseIcon.classList.add('visible');
      setTimeout(() => pauseIcon.classList.remove('visible'), 400);
    }
  }

  function stopAudio() {
    audioEl.pause();
    audioEl.currentTime = 0;
    audioEl.onended = null;
    isPlaying = false;
    vinylInner.classList.remove('spinning', 'paused');
    pauseIcon.classList.remove('visible');
  }

  // ===== FLOW =====
  function showTrack(idx) {
    if (idx >= TRACKS.length) { showVictory(); return; }

    const t = TRACKS[idx];
    state.current = idx;
    state.playing = false;
    save();

    $('main').classList.add('active');
    $('trackLabel').textContent = t.num;
    vinylEmoji.textContent = t.emoji;
    swipeHint.classList.remove('visible');
    vinylInner.classList.remove('spinning', 'paused');
    pauseIcon.classList.remove('visible');
    spotifyOverlay.classList.remove('visible');
    spotifyOverlay.innerHTML = '';
    vinylWrap.style.marginTop = '0';
    isTransitioning = true;

    drawVinyl(vinylCanvas, t);

    // Animate in: rise from bottom (forward) or descend from top (back)
    vinylWrap.classList.remove('rising', 'exiting', 'dropping', 'descending');
    void vinylWrap.offsetWidth;
    vinylWrap.classList.add(goingBack ? 'descending' : 'rising');
    goingBack = false;

    setTimeout(() => {
      isTransitioning = false;

      if (t.spotify) {
        vinylInner.classList.add('spinning');
        spotifyOverlay.innerHTML = '<iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/1VqentdFTvxluBvmB2QpNd?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
        if (t.hint) swipeHint.querySelector('span:last-child').textContent = t.hint;
        vinylWrap.style.marginTop = '-60px';
        setTimeout(() => {
          spotifyOverlay.classList.add('visible');
          if (t.hint) swipeHint.classList.add('visible');
        }, 800);
      } else {
        startAudio(t.src);
        // Show swipe hint after song has been playing a bit
        const hintText = t.hint || 'swipe up';
        swipeHint.querySelector('span:last-child').textContent = hintText;
        setTimeout(() => swipeHint.classList.add('visible'), 8000);
        audioEl.onended = () => {
          swipeHint.classList.add('visible');
        };
      }
    }, 700);
  }

  function advanceTrack() {
    if (isTransitioning) return;
    isTransitioning = true;

    stopAudio();
    swipeHint.classList.remove('visible');
    spotifyOverlay.classList.remove('visible');

    // Exit upward
    vinylWrap.classList.remove('rising', 'dropping');
    vinylWrap.classList.add('exiting');

    const nextIdx = state.current + 1;

    setTimeout(() => {
      if (nextIdx >= TRACKS.length) {
        showVictory();
      } else {
        showTrack(nextIdx);
      }
    }, 700);
  }

  function goBack() {
    if (isTransitioning) return;
    // On first track, swipe down goes back to title screen
    if (state.current <= 0) {
      stopAudio();
      $('main').classList.remove('active');
      $('resetBtn').style.display = 'none';
      const titleEl = $('title');
      titleEl.style.display = 'flex';
      titleEl.classList.remove('hidden');
      state = defaults();
      save();
      return;
    }
    isTransitioning = true;
    goingBack = true;

    stopAudio();
    swipeHint.classList.remove('visible');
    spotifyOverlay.classList.remove('visible');

    // Exit downward (reverse direction)
    vinylWrap.classList.remove('rising', 'exiting', 'descending');
    vinylWrap.classList.add('dropping');

    setTimeout(() => {
      showTrack(state.current - 1);
    }, 700);
  }

  function showVictory() {
    state.current = TRACKS.length;
    save();
    $('main').classList.remove('active');
    $('victory').classList.add('active');
    isTransitioning = false;
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#FFD700','#FF6B35','#FF3864','#7B68EE','#2dd4bf','#f0ece2'];
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.width = (3 + Math.random() * 8) + 'px';
        c.style.height = (3 + Math.random() * 8) + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 40);
    }
  }

  // ===== SWIPE DETECTION =====
  let touchStartY = 0;
  let touchStartTime = 0;

  document.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    const dt = Date.now() - touchStartTime;

    if (dt > 500) return; // too slow, not a swipe

    // Swipe up: advance
    if (dy > 60) {
      advanceTrack();
    }
    // Swipe down: go back
    if (dy < -60) {
      goBack();
    }
  }, { passive: true });

  // ===== TAP = PLAY/PAUSE =====
  vinylWrap.addEventListener('click', (e) => {
    // Only toggle if not transitioning and we have audio (not spotify)
    if (!isTransitioning) {
      togglePlayPause();
    }
  });

  // ===== KEYBOARD (for testing on desktop) =====
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ') { e.preventDefault(); togglePlayPause(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); advanceTrack(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); goBack(); }
  });

  // ===== START =====
  $('startBtn').addEventListener('click', () => {
    unlockAudio();
    $('title').classList.add('hidden');
    setTimeout(() => {
      $('title').style.display = 'none';
      $('main').classList.add('active');
      $('resetBtn').style.display = 'block';
      showTrack(state.current);
    }, 800);
  });

  // ===== RESET =====
  $('resetBtn').addEventListener('click', () => {
    if (confirm('Reset?')) {
      state = defaults();
      save();
      stopAudio();
      spotifyOverlay.classList.remove('visible');
      spotifyOverlay.innerHTML = '';
      $('victory').classList.remove('active');
      isTransitioning = false;
      showTrack(0);
    }
  });

  window.addEventListener('resize', () => {
    if (state.current < TRACKS.length) drawVinyl(vinylCanvas, TRACKS[state.current]);
  });

  // ===== INIT =====
  if (state.current >= TRACKS.length) {
    $('title').style.display = 'none';
    $('main').classList.add('active');
    $('resetBtn').style.display = 'block';
    showVictory();
  } else if (state.current > 0) {
    $('title').style.display = 'none';
    $('main').classList.add('active');
    $('resetBtn').style.display = 'block';
    showTrack(state.current);
  }

  // Confetti on title screen
  if ($('title').style.display !== 'none') {
    setTimeout(launchConfetti, 300);
  }

  window.addEventListener('beforeunload', save);
</script>
</body>
</html>
